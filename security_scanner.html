<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebShield — Güvenlik Tarayıcı</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --ink:      #111010;
      --ink-2:    #3a3839;
      --ink-3:    #7a7675;
      --ink-4:    #b8b4b3;
      --ink-5:    #dbd7d6;
      --paper:    #f5f3f0;
      --paper-2:  #eeebe7;
      --paper-3:  #e4e0db;
      --white:    #fefefe;
      --green:    #1a6b3a;
      --green-bg: #eef7f2;
      --green-border: #c0deca;
      --amber:    #8a5c00;
      --amber-bg: #fdf6e8;
      --amber-border: #e0c980;
      --red:      #a51c1c;
      --red-bg:   #fdf0f0;
      --red-border: #e0b0b0;
      --blue:     #1c4fa5;
      --blue-bg:  #eff4fd;
      --blue-border: #b0c8e8;
      --r: 3px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --serif: 'Fraunces', serif;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Typography ───────────────────────────────────────────────────────── */
    h1, h2, h3 { font-family: var(--serif); font-weight: 700; letter-spacing: -0.025em; }
    .hero h1, .hero h1 em { font-family: 'Calibri', 'Gill Sans', 'Trebuchet MS', sans-serif; }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .container { max-width: 1040px; margin: 0 auto; padding: 0 28px 80px; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 28px; max-width: 1040px; margin: 0 auto; }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark { width: 30px; height: 30px; border: 1.5px solid var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-family: var(--mono); font-weight: 600; color: var(--ink); flex-shrink: 0; }
    .logo-text { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; }

    .nav-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 13px; color: var(--ink-3); border: 1px solid var(--paper-3); padding: 5px 12px; border-radius: 20px; }
    .nav-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: breathe 2.5s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .divider { height: 1px; background: var(--paper-3); margin: 0 28px; }

    /* ── Hero & Scanner ───────────────────────────────────────────────────── */
    .hero { padding: 64px 0 48px; text-align: center; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 13px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 22px; }
    .hero h1 { font-size: clamp(36px, 5.5vw, 66px); font-weight: 600; line-height: 1.08; color: var(--ink); margin-bottom: 16px; }
    .hero-sub { font-size: 17px; font-weight: 400; color: var(--ink-2); line-height: 1.7; max-width: 420px; margin: 0 auto 40px; }

    .scanner-wrap { max-width: 580px; margin: 0 auto; }
    .scanner-box { display: flex; align-items: center; gap: 10px; background: var(--white); border: 1px solid var(--paper-3); border-radius: 10px; padding: 7px 7px 7px 18px; box-shadow: var(--shadow-sm); }
    .url-input { flex: 1; border: none; background: transparent; font-family: var(--mono); font-size: 15px; color: var(--ink); outline: none; }

    .btn-scan { background: var(--ink); color: var(--white); border: none; border-radius: 7px; padding: 11px 22px; font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── News Grid ────────────────────────────────────────────────────────── */
    .news-section { border-top: 1px solid var(--paper-3); padding-top: 56px; margin-top: 56px; }
    .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .news-card { display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--paper-3); border-radius: 8px; overflow: hidden; text-decoration: none; color: var(--ink); transition: transform 0.15s; }
    .news-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    
    /* Resim Alanı Düzenlemesi */
    .news-img-container { width: 100%; height: 180px; background: var(--paper-2); overflow: hidden; position: relative; }
    .news-img { width: 100%; height: 100%; object-fit: cover; }
    
    .news-body { padding: 14px 16px; flex: 1; }
    .news-title { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 5px; }
    .news-summary { font-size: 13px; font-family: var(--mono); color: var(--ink-4); line-height: 1.6; }
</style>
</head>

<body>

  <nav>
    <a href="#" class="logo">
      <div class="logo-mark">WS</div>
      <span class="logo-text">WebShield</span>
    </a>
    <div class="nav-badge">
      <div class="nav-badge-dot"></div>
      Canlı Tarayıcı
    </div>
  </nav>
  <div class="divider"></div>

  <div class="container">
    <section class="hero">
      <div class="hero-eyebrow">Web Güvenlik Tarayıcısı</div>
      <h1>Siteniz <em>ne kadar</em><br>güvenli?</h1>
      <p class="hero-sub">SQLi, XSS ve daha fazlasını analiz edin.</p>

      <div class="scanner-wrap">
        <div class="scanner-box">
          <input type="text" class="url-input" id="targetUrl" placeholder="https://site-adresi.com">
          <button class="btn-scan" id="scanBtn" onclick="startScan()">Tara</button>
        </div>
      </div>
    </section>

    <section class="news-section">
      <div style="margin-bottom: 24px;">
        <h2 style="font-family:var(--serif); font-size: 24px;">Dünyadan Teknoloji Haberleri</h2>
      </div>
      <div class="news-grid" id="newsGrid">
        </div>
    </section>
  </div>

  <script>
    // HTML Kaçış Fonksiyonu (XSS Koruması için)
    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Haberleri Yükleme Fonksiyonu
    async function loadNews() {
      const grid = document.getElementById('newsGrid');
      try {
        // Not: Gerçek API bağlantısı için endpoint gereklidir, bu örnek veridir.
        const mockData = [
          {
            title: "Yapay Zeka Güvenliğinde Yeni Dönem",
            summary: "Siber güvenlik uzmanları yeni nesil tehditlere karşı uyarıyor.",
            image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b",
            link: "#"
          },
          {
            title: "WebShield v2.0 Yayınlandı",
            summary: "Daha hızlı tarama ve derinlemesine raporlama özellikleri eklendi.",
            image: "hatali_resim_url.jpg", // Hata senaryosu için
            link: "#"
          }
        ];

        grid.innerHTML = mockData.map(a => {
          // ONERROR DÜZELTMESİ: Tırnak çakışmasını önlemek için JavaScript string içinde tek tırnak kullanıyoruz.
          const defaultImg = '/static/varsayilan-haber-resmi.jpg';
          
          return `
            <a class="news-card" href="${escapeHTML(a.link)}">
              <div class="news-img-container">
                <img 
                  src="${escapeHTML(a.image)}" 
                  class="news-img" 
                  alt="Haber Resmi"
                  onerror="this.onerror=null; this.src='${defaultImg}';" 
                />
              </div>
              <div class="news-body">
                <div class="news-title">${escapeHTML(a.title)}</div>
                <div class="news-summary">${escapeHTML(a.summary)}</div>
              </div>
            </a>`;
        }).join('');
      } catch(e) {
        grid.innerHTML = '<p>Haberler yüklenirken bir hata oluştu.</p>';
      }
    }

    function startScan() {
      const url = document.getElementById('targetUrl').value;
      if(!url) return alert("Lütfen bir URL girin.");
      alert(url + " taranıyor...");
    }

    // Sayfa yüklendiğinde çalıştır
    document.addEventListener('DOMContentLoaded', loadNews);
  </script>
</body>
</html>
